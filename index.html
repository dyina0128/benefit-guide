<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한민국 혜택 생활 가이드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header style="background-color: #0076c0; color: white; text-align: center; padding: 40px 20px; margin-bottom: 20px;">
        <h1 style="margin: 0; font-size: 2.2rem; font-weight: bold;">정부 지원금 및 복지 혜택 가이드</h1>
        <p style="margin: 10px 0 0 0; font-size: 1.1rem; opacity: 0.9;">나에게 맞는 숨은 정부 혜택을 한눈에 확인하세요.</p>
    </header>

    <div style="max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; gap: 10px; margin-bottom: 20px;">
        <select id="region" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;">
            <option value="전국">🌐 전국 공통 혜택</option>
            <option value="서울">🏙️ 서울특별시</option>
            <option value="인천">⚓ 인천광역시</option>
            <option value="경기">🌳 경기도</option>
            <option value="부산">🌊 부산광역시</option>
            <option value="대구">🍎 대구광역시</option>
            <option value="광주">✨ 광주광역시</option>
            <option value="대전">🔬 대전광역시</option>
            <option value="울산">🐳 울산광역시</option>
            <option value="강원">🏔️ 강원도</option>
            <option value="충북">🌾 충청북도</option>
            <option value="충남">🌅 충청남도</option>
            <option value="전북">🍲 전북특별자치도</option>
            <option value="전남">⚓ 전라남도</option>
            <option value="경북">⛰️ 경상북도</option>
            <option value="경남">🚢 경상남도</option>
            <option value="제주">🍊 제주특별자치도</option>
        </select>
        <input type="text" id="searchInput" placeholder="찾으시는 혜택을 검색해 보세요..." style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;">
    </div>

    <div id="cards" class="card-container"></div>

    <div id="favorites" class="card-container" style="display:none;"></div>
    <div id="detailBox" style="display:none;"><div id="detailContent"></div></div>
    <button id="darkModeBtn" style="display:none;">🌓</button>

    <footer style="background-color: #f8fafc; border-top: 1px solid #e2e8f0; text-align: center; padding: 30px 20px; margin-top: 50px; font-size: 0.9rem; color: #64748b;">
        <div style="max-width: 1200px; margin: 0 auto;">
            <p style="margin: 0 0 10px 0; font-weight: bold;">© 2026 대한민국 혜택 생활 가이드. All Rights Reserved.</p>
            <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 10px;">
                <a href="privacy.html" style="color: #0076c0; text-decoration: none; font-weight: bold;">개인정보처리방침</a>
                <span style="color: #cbd5e1;">|</span>
                <a href="terms.html" style="color: #0076c0; text-decoration: none; font-weight: bold;">이용약관</a>
            </div>
            <p style="margin: 0; font-size: 0.8rem; color: #94a3b8;">본 사이트는 유용한 정부 복지 혜택 정보를 정리하여 제공하는 가이드 블로그입니다.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
