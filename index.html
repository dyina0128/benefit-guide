<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한민국 혜택 생활 가이드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>정부 지원금 및 복지 혜택 가이드</h1>
        <p>나에게 맞는 숨은 정부 혜택을 한눈에 확인하세요.</p>
    </header>

    <div class="control-box">
        <select id="region">
            <option value="전국">🌐 전국 공통 혜택</option>
            <option value="서울">🏙️ 서울특별시</option>
            <option value="인천">⚓ 인천광역시</option>
            <option value="경기">🌳 경기도</option>
            <option value="부산">🌊 부산광역시</option>
            <option value="대구">🍎 대구광역시</option>
            <option value="광주">빛 광주광역시</option>
            <option value="대전">🔬 대전광역시</option>
            <option value="울산">🐳 울산광역시</option>
        </select>
        <input type="text" id="searchInput" placeholder="찾으시는 혜택을 검색해 보세요 (예: 장려금, 청년)...">
    </div>

    <main>
        <div id="cards" class="card-container">
            </div>
    </main>

    <section class="favorites-section">
        <h2>⭐ 내가 저장한 혜택 보관함</h2>
        <div id="favorites" class="card-container"></div>
    </section>

    <div id="detailBox" class="detail-container">
        <div id="detailContent">카드를 선택하시면 상세 신청 방법이 나타납니다.</div>
    </div>

    <button id="darkModeBtn" class="floating-btn">🌓 모드 전환</button>

    <script src="script.js"></script>
</body>
</html>
